api_version: eve.plugin/v1
kind: package
id: goose
display_name: Goose
commands:
  install: {exec: scripts/package-plugin, args: [goose, install]}
  status: {exec: scripts/package-plugin, args: [goose, status]}
  down: {exec: scripts/package-plugin, args: [goose, down]}
supports: {os_families: [ubuntu], arches: [amd64, arm64]}
depends_on: [dev-toolchain]
down: {destructive: true}
env: []
update:
  ubuntu: 'command -v goose >/dev/null 2>&1 && goose update 2>/dev/null || echo "skip"'
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/goose.sh]
