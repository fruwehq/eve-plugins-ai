api_version: eve.plugin/v1
kind: package
id: claude
display_name: Claude Code
commands:
  install: {exec: scripts/package-plugin, args: [claude, install]}
  status: {exec: scripts/package-plugin, args: [claude, status]}
  down: {exec: scripts/package-plugin, args: [claude, down]}
supports: {os_families: [ubuntu]}
depends_on: [dev-toolchain]
down: {destructive: true}
env: []
update:
  ubuntu: 'command -v claude >/dev/null 2>&1 && curl -fsSL https://claude.ai/install.sh | sh || echo "skip"'
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/claude.sh]
