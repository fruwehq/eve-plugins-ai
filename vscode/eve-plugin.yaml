api_version: eve.plugin/v1
kind: package
id: vscode
display_name: Visual Studio Code
commands:
  install: {exec: scripts/package-plugin, args: [vscode, install]}
  status: {exec: scripts/package-plugin, args: [vscode, status]}
  down: {exec: scripts/package-plugin, args: [vscode, down]}
supports: {os_families: [ubuntu]}
down: {destructive: true}
env: []
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/vscode.sh]
