api_version: eve.plugin/v1
kind: package
id: dev-toolchain
display_name: Developer Toolchain
commands:
  install: {exec: scripts/package-plugin, args: [dev-toolchain, install]}
  status: {exec: scripts/package-plugin, args: [dev-toolchain, status]}
  down: {exec: scripts/package-plugin, args: [dev-toolchain, down]}
supports: {os_families: [ubuntu]}
down: {destructive: true}
env: []
update:
  # dev-toolchain installs the container engine + Rust toolchain, so it owns
  # their upgrades.
  ubuntu: |
    command -v docker >/dev/null 2>&1 && sudo apt-get install --only-upgrade -y docker-ce docker-ce-cli containerd.io 2>/dev/null || echo "skip"
    command -v rustup >/dev/null 2>&1 && rustup update || echo "skip"
vagrant:
  inline_provision:
    ubuntu: |
      sudo apt-get install -y build-essential pkg-config libssl-dev
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/dev-toolchain.sh]
bundles:
  - id: dev-ai
    includes: [dev-toolchain, goose, claude, codex-cli, hermes, opencode, vscode]
